services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: emailtriage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: emailtriage
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailtriage"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./token.json:/app/token.json
      - ./state.json:/app/state.json
    environment:
      POSTGRES_URL: postgresql+asyncpg://emailtriage:${POSTGRES_PASSWORD}@db:5432/emailtriage
      TZ: America/New_York

volumes:
  postgres_data:
